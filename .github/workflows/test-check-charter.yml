# Self-test: verify that check-charter.yml runs correctly against this repository.
# Uses prefix="." so the VERSION at the repo root is treated as the local version.
# Since this IS the source repository, versions will always match and the workflow
# will complete with "up to date" status without creating any PR.

name: test-check-charter

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/check-charter.yml"
      - ".github/workflows/test-check-charter.yml"
      - "VERSION"
  schedule:
    - cron: "40 3 * * 1"  # Every Monday at 03:40 UTC (10 min after check-charter runs in adopting projects)
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/check-charter.yml
    with:
      prefix: "."
    permissions:
      contents: write
      pull-requests: write
